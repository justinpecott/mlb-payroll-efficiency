version: 2

sources:
  - name: raw
    database: "{{ var('raw_database', 'BASEBALL') }}"
    schema: "{{ var('raw_schema', 'RAW') }}"
    description: "Raw tables loaded from S3 parquet files"
    tables:
      - name: batting
        description: "Fangraphs player batting stats 2021-2025"
      - name: pitching
        description: "Fangraphs player pitching stats 2021-2025"
      - name: payroll_players
        description: "Fangraphs team payroll by player 2021-2025"
      - name: payroll_summary
        description: "Fangraphs luxury tax payroll estimates by team 2021-2025"
      - name: payroll_other_payments
        description: "Trade subsidies, buyouts, and luxury tax adjustments 2021-2025"

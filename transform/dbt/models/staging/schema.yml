  - name: stg_payroll_summary
    description: >
      Fangraphs luxury tax (Competitive Balance Tax) payroll estimates by team,
      2021-2025. One row per team per season. The luxury_tax_payroll_estimate
      reflects total CBT obligations, which can differ from actual salary spend
      due to contract structuring, deferred money, and prorated signing bonuses.
      Used in team_war_value to compare actual payroll against CBT commitments.
    columns:
      - name: team
        description: "Team name (matches team names in stg_payroll_players for joining)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_teams')
                field: team_name
      - name: season
        description: "MLB season year."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2021, 2022, 2023, 2024, 2025]
      - name: luxury_tax_payroll_estimate
        description: >
          Estimated Competitive Balance Tax payroll for the team in the given season.
          Differs from total_salary in team_war_value due to contract structuring,
          deferred money, and adjustments not captured in raw salary figures.
      - name: source_file
        description: "Source Excel file name the row was parsed from, for lineage tracing."

  - name: stg_payroll_other_payments
    description: >
      Non-roster payroll obligations by team, 2021-2025. Covers trade subsidies,
      contract buyouts, retained salary on traded players, and other CBT adjustments
      not tied to an active player. One row per payment event.
      Not currently joined into the $/WAR models — useful for full payroll
      reconciliation against luxury tax figures.
    columns:
      - name: team
        description: "Team name carrying the payment obligation."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_teams')
                field: team_name
      - name: season
        description: "MLB season year the payment applies to."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2021, 2022, 2023, 2024, 2025]
      - name: payment_type
        description: "Category of the obligation (e.g. 'Trade Subsidy', 'Buyout', 'Retained Salary')."
      - name: payment_description
        description: "Free-text description, typically including player name and transaction context."
      - name: amount
        description: "Dollar amount of the obligation in the given season."
      - name: future_amounts
        description: "VARIANT (JSON array) of future payment installments for multi-year subsidies or buyout schedules."
      - name: source_file
        description: "Source Excel file name the row was parsed from, for lineage tracing."

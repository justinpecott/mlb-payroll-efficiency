      - name: iffb_pct
        description: "Infield fly ball rate induced."
      - name: hr_per_fb
        description: "Home run per fly ball rate allowed. League-normalized in xFIP."
      - name: ifh_pct
        description: "Infield hit rate allowed."
      - name: buh_pct
        description: "Bunt hit rate allowed."
      - name: k_per_9
        description: "Strikeouts per 9 innings."
      - name: bb_per_9
        description: "Walks per 9 innings."
      - name: k_per_bb
        description: "Strikeout-to-walk ratio."
      - name: h_per_9
        description: "Hits per 9 innings."
      - name: hr_per_9
        description: "Home runs per 9 innings."
      - name: rs_per_9
        description: "Run support per 9 innings."
      - name: k_pct
        description: "Strikeout rate (SO/TBF)."
      - name: bb_pct
        description: "Walk rate (BB/TBF)."
      - name: k_bb_pct
        description: "K% minus BB%. Simple command/dominance metric."
      - name: e_f
        description: "ERA minus FIP. Large positive values suggest the pitcher may regress toward their FIP."
      - name: kwera
        description: "K-Walk ERA. Simplified ERA estimator using only K and BB rates."
      - name: era_minus
        description: "ERA scaled to league and park average. 100 = average, lower is better."
      - name: fip_minus
        description: "FIP scaled to league and park average. 100 = average, lower is better."
      - name: xfip_minus
        description: "xFIP scaled to league and park average."
      - name: k_per_9_plus
        description: "K/9 scaled to league average (100 = average, higher is better)."
      - name: bb_per_9_plus
        description: "BB/9 scaled to league average (100 = average, lower is better for pitchers)."
      - name: k_per_bb_plus
        description: "K/BB scaled to league average."
      - name: h_per_9_plus
        description: "H/9 scaled to league average."
      - name: hr_per_9_plus
        description: "HR/9 scaled to league average."
      - name: avg_plus
        description: "Batting average against scaled to league and park average."
      - name: whip_plus
        description: "WHIP scaled to league average."
      - name: babip_plus
        description: "BABIP against scaled to league average."
      - name: lob_pct_plus
        description: "Strand rate scaled to league average."
      - name: k_pct_plus
        description: "K% scaled to league average."
      - name: bb_pct_plus
        description: "BB% scaled to league average."
      - name: ld_pct_plus
        description: "Line drive rate allowed scaled to league average."
      - name: gb_pct_plus
        description: "Ground ball rate scaled to league average."
      - name: fb_pct_plus
        description: "Fly ball rate scaled to league average."
      - name: hr_per_fb_pct_plus
        description: "HR/FB rate scaled to league average."
      - name: pull_pct_plus
        description: "Pull rate allowed scaled to league average."
      - name: cent_pct_plus
        description: "Center field rate allowed scaled to league average."
      - name: oppo_pct_plus
        description: "Opposite field rate allowed scaled to league average."
      - name: soft_pct_plus
        description: "Soft contact rate scaled to league average."
      - name: med_pct_plus
        description: "Medium contact rate scaled to league average."
      - name: hard_pct_plus
        description: "Hard contact rate allowed scaled to league average."
      - name: war
        description: "Fangraphs Wins Above Replacement (fWAR). Primary value metric used in downstream $/WAR models."
      - name: ra9_war
        description: "WAR calculated using RA/9 instead of FIP. Reflects actual runs allowed including defense and luck."
      - name: rar
        description: "Runs above replacement (total)."
      - name: bip_wins
        description: "WAR component from balls in play outcomes."
      - name: lob_wins
        description: "WAR component from strand rate — the LOB% contribution to wins."
      - name: fdp_wins
        description: "WAR component from fielding-dependent plays."
      - name: wpa
        description: "Win probability added."
      - name: minus_wpa
        description: "WPA from negative outcomes."
      - name: plus_wpa
        description: "WPA from positive outcomes."
